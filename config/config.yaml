# ─────────────────────────────────────────────────────────────────────────────
# Options Bot Configuration
# ─────────────────────────────────────────────────────────────────────────────
# VALIDATION PASSED: 10/10 trades closed, 90% win rate, $1,229 realised P&L
# Switched to live mode 2026-03-20. Covered call disabled — TSLA shares in MooMoo.
# Re-enable covered_call and set shares_held once TSLA transferred to IBKR.
# ─────────────────────────────────────────────────────────────────────────────

mode: live         # "paper" | "live"  — VALIDATION PASSED 10/10 trades, 90% win rate

# ── Broker Configuration ─────────────────────────────────────────────────────
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  MODE 1 — Hybrid (CURRENT): MooMoo data + IBKR execution               │
# │    data:      "moomoo"                                                   │
# │    execution: "ibkr"                                                     │
# ├─────────────────────────────────────────────────────────────────────────┤
# │  MODE 2 — Full IBKR: subscribe to US market data (~$14.50/mo)          │
# │    data:      "ibkr"                                                     │
# │    execution: "ibkr"                                                     │
# ├─────────────────────────────────────────────────────────────────────────┤
# │  MODE 3 — Full MooMoo: paper trading only (SG API limitation)          │
# │    data:      "moomoo"                                                   │
# │    execution: "moomoo"                                                   │
# └─────────────────────────────────────────────────────────────────────────┘
broker:
  data:      "moomoo"   # "moomoo" | "ibkr"
  execution: "ibkr"     # "moomoo" | "ibkr"

# ── MooMoo OpenD connection ───────────────────────────────────────────────────
moomoo:
  host:       "127.0.0.1"
  port:       11111
  trade_env:  "REAL"       # "SIMULATE" = paper | "REAL" = live
  stock_account_id:  "565755"       # Holds the 100 TSLA shares
  option_account_id: "4310610"      # All options orders route here

# ── Interactive Brokers connection ────────────────────────────────────────────
# Port reference:
#   TWS paper trading  : 7497
#   TWS live trading   : 7496   ← current (live account U18705798)
#   IB Gateway paper   : 4002
#   IB Gateway live    : 4001
ibkr:
  host:      "127.0.0.1"
  port:      7496          # Live TWS port (account U18705798)
  client_id: 1             # Unique ID per connection (1-32)
  account:   "U18705798"   # Live account

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:        "INFO"       # DEBUG | INFO | WARNING | ERROR
  file:         "logs/bot.log"
  max_bytes:    10485760     # 10 MB per file
  backup_count: 5

# ── Universe ──────────────────────────────────────────────────────────────────
universe:
  watchlist:
    - "US.SPY"    # S&P 500 ETF — deepest options market, massive buffer at current strikes
    - "US.QQQ"    # Nasdaq 100 ETF — IV elevates on macro/tech news
    - "US.AAPL"   # Perfect price range (~$225), enormous OI, regular IV cycles
    - "US.MSFT"   # Less volatile than TSLA/NVDA — good baseline signal for comparison
    - "US.AMZN"   # Post-split price in $10-width sweet spot, e-commerce + cloud IV mix
    - "US.GOOGL"  # Liquid, diversified revenue, less correlated to pure-tech names
    - "US.NVDA"   # Highest single-stock options volume, IV consistently elevated
    - "US.TSLA"   # Spreads only — covered call disabled until shares transferred to IBKR

  # Shares held override for paper trading.
  # The simulator account won't reflect real share positions, so declare them
  # here so the covered call strategy fires correctly.
  # Set to 0 (or remove) when switching to live — live account is queried directly.
  shares_held:
    "US.TSLA": 0     # Shares in MooMoo — transfer to IBKR before re-enabling covered call

# ── Regime detection ─────────────────────────────────────────────────────────
regime:
  high_vol_vix_threshold:  25.0   # VIX >= this → high_vol (no new trades)
  bull_rsi_threshold:      55.0   # RSI >= this AND MACD > 0 → bull  (v1 fallback only)
  bear_rsi_threshold:      45.0   # RSI <= this AND MACD < 0 → bear  (v1 fallback only)
  macd_threshold:          0.0

# ── LLM Regime Detection ─────────────────────────────────────────────────────
# Optional second-tier regime detection using LLM chart vision analysis.
# Runs in background threads during market hours only (09:30–16:00 ET).
# Provides directional bias (LONG_ONLY / SHORT_ONLY / BOTH) to supplement
# the quantitative HMM/Hurst regime bridge.
#
# Requires:
#   pip3 install -e "/Users/user/llm-regime[google]"
#   export GOOGLE_API_KEY="your_key_here"   (add to ~/.zshrc for persistence)
#
# Provider options:
#   "gemini"    → GOOGLE_API_KEY     (~$0.30/month for 8 symbols)  ← recommended
#   "anthropic" → ANTHROPIC_API_KEY  (~$81/month — best accuracy)
#   "ollama"    → no key needed      (free, local, install ollama first)
#
# Cost estimate at default settings (gemini):
#   2 LLM calls/symbol/day × 8 symbols = 16 calls/day = ~$0.014/day = ~$0.30/month
llm_regime:
  provider:          "gemini"   # "gemini" | "anthropic" | "openai" | "ollama"
  htf_interval_secs: 7200       # HTF call interval: 2h — macro trend changes slowly
  ltf_interval_secs: 1800       # LTF call interval: 30min — aligns with monitor cycle
                                # LTF fires every 30min during market hours to track
                                # intraday regime shifts (downtrend → ranging → uptrend)
  min_confidence:    3          # Minimum LLM confidence (1–5) to trust direction signal
                                # Below this threshold → fall back to quant drift detection

# ── Options parameters ────────────────────────────────────────────────────────
options:
  target_dte_min:           21    # Minimum days to expiry
  target_dte_max:           45    # Maximum days to expiry
  earnings_buffer_days:     7     # Buffer before/after earnings
  min_open_interest:        100
  otm_call_delta_min:       0.20
  otm_call_delta_max:       0.35
  spread_width_target:      10.0  # Target $10 spread width
                                  # ⚠ fixed width — see synopsis.md Section 2.4 for
                                  #   known limitation on high-priced stocks (>$500)

# ── Per-strategy configuration ───────────────────────────────────────────────
strategies:

  covered_call:
    enabled:                  false   # Re-enable once TSLA shares transferred from MooMoo to IBKR
    min_iv_rank:              30    # Only sell when IV is elevated
    max_rsi:                  70    # Don't sell calls at extreme overbought
    max_concurrent_positions: 2

  bear_call_spread:
    enabled:                  true
    min_iv_rank:              35
    min_rsi_for_spread:       45    # Don't sell calls in freefall
    min_pct_b:                0.40
    min_credit:               0.50
    min_reward_risk:          0.20
    spread_width_target:      10.0  # ⚠ fixed — see synopsis.md Section 2.4
    max_concurrent_positions: 3
    allowed_regimes:
      - "bear"
      - "neutral"

  bull_put_spread:
    enabled:                  true
    min_iv_rank:              35
    min_rsi_floor:            35    # Don't sell puts in freefall
    max_rsi_ceiling:          65    # Don't sell puts at extreme overbought
    min_pct_b:                0.20
    min_credit:               0.50
    min_reward_risk:          0.20
    spread_width_target:      10.0  # ⚠ fixed — see synopsis.md Section 2.4
    max_concurrent_positions: 3
    allowed_regimes:
      - "bull"
      - "neutral"

# ── Portfolio-level risk controls ─────────────────────────────────────────────
portfolio_guard:
  max_open_positions:   2        # Small account — max 2 positions at a time
  max_risk_pct:         0.50     # 50% per trade — allows 1 contract (~$750-850 max loss)
  max_total_risk_pct:   0.90     # 90% total — allows 2 positions simultaneously
  max_trades_per_day:   1        # Conservative — 1 new trade per day on small account
  portfolio_value:      1724     # IBKR account U18705798 — USD balance (converted from SGD)

# ── Signal ranking ───────────────────────────────────────────────────────────
# Composite score:
#   score = (iv_rank_norm × weight_iv_rank)
#         + (buffer_norm  × weight_buffer_pct)
#         + (rr_norm      × weight_reward_risk)
#
# Each dimension is min-max normalised within the current candidate pool.
# Adjust weights as paper trade data accumulates.
signal_ranker:
  enabled:             true    # false = revert to FIFO order (no ranking)
  weight_iv_rank:      0.40    # 40% — how elevated is the premium?
  weight_buffer_pct:   0.35    # 35% — how much buffer to the short strike?
  weight_reward_risk:  0.25    # 25% — how efficient is the trade?

# ── Order execution ───────────────────────────────────────────────────────────
execution:
  fill_timeout_seconds: 60       # Max wait for limit order fill

# ── Position monitoring ───────────────────────────────────────────────────────
position_monitor:
  check_interval_minutes: 30     # How often to check during market hours
  max_price_failures:     3      # Alert after N consecutive price fetch failures
  exit_rules:
    stop_loss_multiplier:  3.0   # Close when cost = 3× credit (e.g. sold $2, close at $6)
    min_days_before_stop:  5     # Don't stop before day 5 — vega noise dominates before theta kicks in
    take_profit_pct:       0.50  # Close when we've kept 50% of premium
    dte_close_threshold:   21    # Always close at 21 DTE (gamma risk)
    expired_dte_threshold: 0     # Close expired options

# ── Scheduler ────────────────────────────────────────────────────────────────
scheduler:
  # Times in US Eastern Time (ET)
  market_scan_time:         "09:35"    # Scan universe shortly after open
  iv_collection_time:       "16:05"    # Collect IV after close (for IV Rank)
  weekly_report_day:        "friday"   # Day of week for validation report
  weekly_report_time:       "16:30"    # Time for weekly validation report

# ── Validation criteria ───────────────────────────────────────────────────────
validation:
  min_trades:        10      # Minimum closed trades before evaluation
  min_win_rate:      0.60    # Minimum 60% win rate
  min_sharpe_like:   0.50    # Minimum Sharpe-like ratio
